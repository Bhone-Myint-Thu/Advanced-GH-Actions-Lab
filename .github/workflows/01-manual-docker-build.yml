name: Manual Docker Build and Push To Aws ECR

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Choose Docker service to build"
        required: true
        default: "integration"
        type: choice
        options:
          - frontend
          - backend
          - integration
      push_image:
        description: "Push image to ECR?"
        required: true
        default: false
        type: boolean

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY_URI: 950538586666.dkr.ecr.ap-southeast-1.amazonaws.com/bhonemyintthu/advanced_gh_actions_lab_images
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker variables
        run: |
          echo "APP_NAME=${{ inputs.service }}-app" >> $GITHUB_ENV
          echo "DOCKERFILE=apps/${{ inputs.service }}/Dockerfile" >> $GITHUB_ENV

      - name: Configure AWS credentials
        if: ${{ inputs.push_image == true }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ inputs.push_image == true }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image Only
        if: ${{ inputs.push_image == false }}
        run: |
          docker buildx build             --platform linux/amd64             -f $DOCKERFILE             -t $ECR_REPOSITORY_URI:${APP_NAME}-${IMAGE_TAG::7}             .

      - name: Build & Push Docker Image
        if: ${{ inputs.push_image == true }}
        run: |
          docker buildx build             --platform linux/amd64             --push             -f $DOCKERFILE             -t $ECR_REPOSITORY_URI:${APP_NAME}-${IMAGE_TAG::7}             .
